name: testv

services:
  app:
    image: ${APP_IMAGE:-testv-app:local}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_BAIDU_TONGJI_ID: ${NEXT_PUBLIC_BAIDU_TONGJI_ID:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_BAIDU_TONGJI_ID: ${NEXT_PUBLIC_BAIDU_TONGJI_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      default: {}
      proxy:
        aliases:
          - ${APP_NETWORK_ALIAS:-app}

networks:
  proxy:
    external: true
    name: ${CADDY_NETWORK:-caddy_proxy}
